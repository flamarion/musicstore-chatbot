# Self-contained deployment: the LangGraph agent server (Postgres + Redis for
# persistence) + LangChain's agent-chat-ui — all on one network so the browser
# can chat with the support bot end-to-end.  The model is NOT run here: the agent
# talks to whatever backend you configure in ./.env (a remote OpenAI-compatible
# LLM_ENDPOINT, or ANTHROPIC_API_KEY for hosted Claude) — same as the standalone CLI.
#
# Bring it up locally:
#     docker compose up --build
# then open http://localhost:3000
#
# Requires: ./.env with LANGSMITH_API_KEY (the self-hosted LangGraph server needs
# it for its license; it also drives tracing) and a reachable model backend
# (LLM_ENDPOINT pointing at your remote model host, or ANTHROPIC_API_KEY).
name: musicstore-chatbot

volumes:
  langgraph-postgres-data:
    driver: local

networks:
  ai:
    name: ai-stack
    driver: bridge

services:
  # ---- Persistence for the LangGraph server -----------------------------------
  langgraph-redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - ai
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5

  langgraph-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: ["postgres", "-c", "shared_preload_libraries=vector"]
    volumes:
      - langgraph-postgres-data:/var/lib/postgresql/data
    networks:
      - ai
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 20s
      start_interval: 1s

  # ---- The support-bot agent, served as a streaming REST API ------------------
  # Built from the generated Dockerfile (langgraph.json -> app.py:make_graph,
  # which omits a checkpointer so the platform's Postgres/Redis own persistence).
  langgraph-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8123:8000"
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
    environment:
      # Persistence injected by the platform (make_graph has no local checkpointer).
      REDIS_URI: redis://langgraph-redis:6379
      POSTGRES_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
    env_file:
      # Model backend + tracing come entirely from .env — same config as the
      # standalone CLI: LLM_ENDPOINT (your remote model host) or ANTHROPIC_API_KEY,
      # plus LLM_MODEL / LLM_TEMPERATURE / MAX_OUTPUT_TOKENS and LANGSMITH_API_KEY
      # (self-hosted server license + tracing).  The container reaches LLM_ENDPOINT
      # over your LAN/internet, so a remote host (e.g. http://192.168.1.163:8033/v1) works.
      - .env
    networks:
      - ai
    healthcheck:
      test: python /api/healthcheck.py
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 2s

  # ---- LangChain agent-chat-ui ------------------------------------------------
  # Proxy mode: the browser only talks to this app's same-origin /api route, which
  # forwards server-side to the agent inside the network — no CORS, key stays off
  # the client.
  agent-chat-ui:
    build:
      context: .
      dockerfile: Dockerfile.chat-ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
        NEXT_PUBLIC_ASSISTANT_ID: support_bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      langgraph-api:
        condition: service_healthy
    environment:
      # Server-side only: where the /api proxy forwards to, and the key it uses.
      LANGGRAPH_API_URL: http://langgraph-api:8000
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    networks:
      - ai
